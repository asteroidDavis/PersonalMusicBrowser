repos:
  - repo: local
    hooks:
      - id: clang-format
        name: clang-format (music_ara_client)
        entry: clang-format -i --style=file
        language: system
        files: ^music_ara_client/(src|tests)/.*\.(cpp|h)$

      - id: cpp-core-tests
        name: music_ara_client core unit tests
        entry: bash -c 'cmake -S music_ara_client -B music_ara_client/build-precommit -DMUSIC_ARA_BUILD_PLUGIN=OFF -DMUSIC_ARA_BUILD_TESTS=ON >/dev/null && cmake --build music_ara_client/build-precommit --target sendtohub_core_tests -j && ctest --test-dir music_ara_client/build-precommit --output-on-failure'
        language: system
        pass_filenames: false
        files: ^music_ara_client/.*\.(cpp|h|txt)$
