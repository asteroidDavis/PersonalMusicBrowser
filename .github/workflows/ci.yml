name: CI

on:
  push:
    branches: [main, "feature/*"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --manifest-path music_browser/Cargo.toml -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            music_browser/target
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('music_browser/Cargo.lock') }}
      - run: cargo clippy --manifest-path music_browser/Cargo.toml -- -D warnings

  test:
    name: Test (${{ matrix.rust }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rust: [stable, "1.88"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            music_browser/target
          key: ${{ runner.os }}-cargo-test-${{ matrix.rust }}-${{ hashFiles('music_browser/Cargo.lock') }}
      - run: cargo test --manifest-path music_browser/Cargo.toml

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-audit --locked
      - run: cd music_browser && cargo generate-lockfile
      - run: cargo audit --file music_browser/Cargo.lock --ignore RUSTSEC-2023-0071
