{% extends "base.html" %}
{% block title %}Add Album — Personal Music Browser{% endblock %}
{% block content %}
<div class="page-header">
    <h2>Add Album</h2>
</div>
<form class="form" method="post">
    <div class="form-group">
        <label for="title">Title <span style="color:var(--danger)">*</span></label>
        <input type="text" id="title" name="title" required value="{{ title }}" placeholder="Enter album title">
    </div>
    <div class="form-group">
        <label class="checkbox-label">
            <input type="checkbox" name="released" value="true" {% if released %}checked{% endif %}>
            Released
        </label>
    </div>
    <div class="form-group">
        <label for="url">URL</label>
        <input type="url" id="url" name="url" value="{{ url }}" placeholder="https://example.com/album">
    </div>
    <div class="form-actions">
        <button type="submit" class="btn btn-primary">💾 Save Album</button>
        <a href="/albums" class="btn">Cancel</a>
    </div>
</form>
{% endblock %}
