<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Personal Music Browser{% endblock %}</title>
    <style>
        :root {
            --bg: #1a1a2e; --surface: #16213e; --primary: #0f3460;
            --accent: #e94560; --text: #eee; --text-muted: #aaa;
            --border: #2a2a4a; --danger: #e94560; --radius: 6px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:var(--bg); color:var(--text); line-height:1.6; }
        .container { max-width:1100px; margin:0 auto; padding:0 1rem; }
        nav { display:flex; align-items:center; justify-content:space-between; padding:1rem 0; border-bottom:1px solid var(--border); margin-bottom:2rem; }
        nav h1 { font-size:1.4rem; color:var(--accent); }
        nav ul { list-style:none; display:flex; gap:1.5rem; }
        nav a { color:var(--text-muted); text-decoration:none; font-size:.95rem; transition:color .2s; }
        nav a:hover { color:var(--accent); }
        .page-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:1.5rem; }
        .page-header h2 { font-size:1.5rem; }
        .count { color:var(--text-muted); margin-bottom:1rem; font-size:.9rem; }
        .empty { color:var(--text-muted); text-align:center; padding:3rem 1rem; font-size:1.1rem; }
        .error { color:var(--danger); padding:.5rem; margin-bottom:1rem; }
        table { width:100%; border-collapse:collapse; background:var(--surface); border-radius:var(--radius); overflow:hidden; }
        th, td { padding:.75rem 1rem; text-align:left; border-bottom:1px solid var(--border); }
        th { background:var(--primary); font-weight:600; font-size:.85rem; text-transform:uppercase; letter-spacing:.5px; }
        tr:hover { background:rgba(255,255,255,.03); }
        .actions { display:flex; gap:.5rem; }
        .btn { display:inline-block; padding:.5rem 1rem; border:1px solid var(--border); border-radius:var(--radius); background:var(--surface); color:var(--text); text-decoration:none; font-size:.9rem; cursor:pointer; transition:all .2s; }
        .btn:hover { border-color:var(--accent); color:var(--accent); }
        .btn-primary { background:var(--accent); border-color:var(--accent); color:#fff; }
        .btn-primary:hover { background:#d63a52; color:#fff; }
        .btn-danger { color:var(--danger); border-color:var(--danger); background:transparent; }
        .btn-danger:hover { background:var(--danger); color:#fff; }
        .btn-sm { padding:.25rem .6rem; font-size:.8rem; }
        .form { max-width:600px; background:var(--surface); padding:2rem; border-radius:var(--radius); }
        .form-group { margin-bottom:1.25rem; }
        .form-group label { display:block; margin-bottom:.35rem; font-size:.9rem; color:var(--text-muted); }
        .form-group input[type="text"], .form-group input[type="url"], .form-group input[type="number"], .form-group select {
            width:100%; padding:.6rem .8rem; background:var(--bg); border:1px solid var(--border); border-radius:var(--radius); color:var(--text); font-size:.95rem;
        }
        .form-group input:focus, .form-group select:focus { outline:none; border-color:var(--accent); }
        .checkbox-label { display:flex; align-items:center; gap:.35rem; font-size:.9rem; cursor:pointer; }
        .form-actions { display:flex; gap:.75rem; margin-top:1.5rem; }
        .flash { padding:.75rem 1rem; margin-bottom:1rem; border-radius:var(--radius); background:#1b5e20; color:#fff; }
    </style>
</head>
<body>
<div class="container">
    <nav>
        <h1>Personal Music Browser</h1>
        <ul>
            <li><a href="/">Songs</a></li>
            <li><a href="/albums">Albums</a></li>
            <li><a href="/artists">Artists</a></li>
            <li><a href="/instruments">Instruments</a></li>
            <li><a href="/recordings">Recordings</a></li>
        </ul>
    </nav>
    {% block content %}{% endblock %}
</div>
</body>
</html>
