<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Personal Music Browser{% endblock %}</title>
    <style>
        :root {
            --bg: #0f0f1a; --surface: #1a1a2e; --primary: #16213e;
            --accent: #e94560; --text: #e2e8f0; --text-muted: #94a3b8;
            --border: #2d3748; --danger: #ef4444; --radius: 8px;
            --prod-accent: #f59e0b; --prod-surface: #1c1917;
            --prac-accent: #10b981; --prac-surface: #064e3b;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -1px rgba(0, 0, 0, 0.15);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.4), 0 4px 6px -2px rgba(0, 0, 0, 0.2);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:var(--bg); color:var(--text); line-height:1.6; min-height:100vh; }
        .container { max-width:1400px; margin:0 auto; padding:0 1.5rem; }
        nav { display:flex; align-items:center; justify-content:space-between; padding:1.25rem 0; border-bottom:1px solid var(--border); margin-bottom:2rem; flex-wrap:wrap; gap:.75rem; background:rgba(15,15,26,0.8); backdrop-filter:blur(10px); position:sticky; top:0; z-index:100; }
        nav h1 { font-size:1.5rem; color:var(--accent); font-weight:700; letter-spacing:-0.5px; }
        nav .nav-links { list-style:none; display:flex; gap:.5rem; flex-wrap:wrap; align-items:center; }
        nav .nav-links li a { color:var(--text-muted); text-decoration:none; font-size:.85rem; transition:all .2s ease; padding:.4rem .75rem; border-radius:var(--radius); border:1px solid transparent; }
        nav .nav-links li a:hover { color:var(--text); background:rgba(255,255,255,.08); border-color:rgba(255,255,255,.1); transform:translateY(-1px); }
        nav .nav-sep { color:var(--border); font-size:.8rem; padding:0 .3rem; margin:0 .25rem; }
        nav .nav-prod a { color:var(--prod-accent); font-weight:600; }
        nav .nav-prod a:hover { background:rgba(245,158,11,.15); border-color:rgba(245,158,11,.3); }
        nav .nav-prac a { color:var(--prac-accent); font-weight:600; }
        nav .nav-prac a:hover { background:rgba(16,185,129,.15); border-color:rgba(16,185,129,.3); }
        nav .nav-jobs a { color:#a78bfa; font-weight:600; }
        nav .nav-jobs a:hover { background:rgba(167,139,250,.15); border-color:rgba(167,139,250,.3); }
        .page-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:2rem; flex-wrap:wrap; gap:1rem; }
        .page-header h2 { font-size:1.75rem; font-weight:700; color:var(--text); letter-spacing:-0.5px; }
        .count { color:var(--text-muted); margin-bottom:1rem; font-size:.9rem; }
        .empty { color:var(--text-muted); text-align:center; padding:4rem 2rem; font-size:1.1rem; background:var(--surface); border-radius:var(--radius); border:1px dashed var(--border); }
        .empty a { color:var(--accent); text-decoration:none; }
        .empty a:hover { text-decoration:underline; }
        .error { color:var(--danger); padding:.75rem 1rem; margin-bottom:1rem; background:rgba(239,68,68,.1); border:1px solid rgba(239,68,68,.3); border-radius:var(--radius); }
        table { width:100%; border-collapse:collapse; background:var(--surface); border-radius:var(--radius); overflow:hidden; box-shadow:var(--shadow); }
        th, td { padding:1rem 1.25rem; text-align:left; border-bottom:1px solid var(--border); }
        th { background:var(--primary); font-weight:600; font-size:.8rem; text-transform:uppercase; letter-spacing:.75px; color:var(--text-muted); }
        tr:last-child td { border-bottom:none; }
        tr:hover { background:rgba(255,255,255,.04); }
        .actions { display:flex; gap:.5rem; flex-wrap:wrap; }
        .btn { display:inline-flex; align-items:center; justify-content:center; gap:.4rem; padding:.6rem 1.2rem; border:1px solid var(--border); border-radius:var(--radius); background:var(--surface); color:var(--text); text-decoration:none; font-size:.9rem; font-weight:500; cursor:pointer; transition:all .2s ease; box-shadow:0 1px 2px rgba(0,0,0,.1); }
        .btn:hover { border-color:var(--accent); color:var(--accent); transform:translateY(-1px); box-shadow:var(--shadow); }
        .btn:active { transform:translateY(0); }
        .btn-primary { background:var(--accent); border-color:var(--accent); color:#fff; }
        .btn-primary:hover { background:#d63a52; color:#fff; border-color:#d63a52; }
        .btn-danger { color:var(--danger); border-color:var(--danger); background:transparent; }
        .btn-danger:hover { background:var(--danger); color:#fff; border-color:var(--danger); }
        .btn-sm { padding:.35rem .75rem; font-size:.8rem; }
        .form { max-width:700px; background:var(--surface); padding:2.5rem; border-radius:var(--radius); box-shadow:var(--shadow-lg); }
        .form-group { margin-bottom:1.5rem; }
        .form-group label { display:block; margin-bottom:.5rem; font-size:.9rem; color:var(--text-muted); font-weight:500; }
        .form-group input, .form-group select, .form-group textarea { width:100%; padding:.75rem 1rem; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); color:var(--text); font-size:.95rem; transition:border-color .2s, box-shadow .2s; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(233,69,96,.15); }
        select { appearance:none; background-image:url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%2394a3b8%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E"); background-repeat:no-repeat; background-position:right .75rem center; background-size:.65em auto; padding-right:2.5rem; }
        select option { background:var(--surface); color:var(--text); }
        .checkbox-label { display:flex; align-items:center; gap:.5rem; font-size:.9rem; cursor:pointer; padding:.5rem 0; }
        .checkbox-label input[type="checkbox"] { width:1.1rem; height:1.1rem; accent-color:var(--accent); }
        .form-actions { display:flex; gap:.75rem; margin-top:2rem; flex-wrap:wrap; }
        .flash { padding:.75rem 1rem; margin-bottom:1rem; border-radius:var(--radius); background:#1b5e20; color:#fff; }
        .text-muted { color:var(--text-muted); font-size:.85rem; }
        .text-danger { color:var(--danger); }
        .card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:1.5rem; box-shadow:0 2px 8px rgba(0,0,0,.2); }
        .filter-btn { transition:all .2s; }
        .filter-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); }
        .filter-btn:hover:not(.active) { background:rgba(255,255,255,.08); }

        /* Production view styles */
        .production-header h2 { color:var(--prod-accent); }
        .legend { display:flex; gap:1rem; flex-wrap:wrap; margin-bottom:1.5rem; font-size:.85rem; color:var(--text-muted); background:var(--surface); padding:1rem 1.25rem; border-radius:var(--radius); border:1px solid var(--border); }
        .prod-card { background:var(--prod-surface); border:1px solid rgba(245,158,11,.2); border-radius:var(--radius); padding:1.5rem; margin-bottom:1.5rem; box-shadow:var(--shadow); transition:box-shadow .2s; }
        .prod-card:hover { box-shadow:var(--shadow-lg); }
        .prod-card-header { display:flex; align-items:flex-start; justify-content:space-between; flex-wrap:wrap; gap:.75rem; margin-bottom:1rem; }
        .prod-card-header h3 { font-size:1.25rem; font-weight:600; color:var(--text); }
        .prod-card-meta { display:flex; gap:.6rem; flex-wrap:wrap; }
        .prod-card-actions { display:flex; gap:.5rem; flex-wrap:wrap; }
        .meta-tag { background:rgba(255,255,255,.08); padding:.2rem .6rem; border-radius:var(--radius); font-size:.8rem; color:var(--text-muted); border:1px solid rgba(255,255,255,.05); }
        .meta-link { text-decoration:none; color:var(--prod-accent); font-weight:500; }
        .meta-link:hover { text-decoration:underline; }
        .song-type-badge { display:inline-block; padding:.2rem .6rem; border-radius:4px; font-size:.7rem; text-transform:uppercase; font-weight:700; letter-spacing:.5px; margin-right:.5rem; }
        .badge-song { background:#3b82f6; color:#fff; }
        .badge-cover { background:#8b5cf6; color:#fff; }
        .badge-composition { background:#10b981; color:#fff; }
        .badge-original { background:#f59e0b; color:#fff; }
        .badge-practice { background:var(--prac-accent); color:#fff; }
        .prod-table { margin-top:.75rem; }
        .prod-table th { background:rgba(245,158,11,.15); color:var(--prod-accent); }
        .inline-form { display:inline; }
        .status-select { background:var(--bg); color:var(--text); border:1px solid var(--border); border-radius:4px; padding:.3rem .5rem; font-size:.85rem; cursor:pointer; transition:border-color .2s; }
        .status-select:focus { border-color:var(--prod-accent); outline:none; }
        .steps-cell { display:flex; flex-wrap:wrap; gap:.4rem; align-items:center; }
        .step-chip { display:inline-flex; align-items:center; gap:.3rem; background:rgba(255,255,255,.06); padding:.2rem .5rem; border-radius:4px; font-size:.8rem; border:1px solid rgba(255,255,255,.05); transition:background .2s; }
        .step-chip:hover { background:rgba(255,255,255,.1); }
        .step-select { background:transparent; color:var(--text); border:none; font-size:.9rem; cursor:pointer; padding:0; width:1.8em; font-weight:600; }
        .step-select:focus { outline:none; }
        .step-label { color:var(--text-muted); font-size:.8rem; }
        .stage-name { font-weight:600; white-space:nowrap; color:var(--text); }
        .song-files { margin-top:1rem; }
        .song-files summary { cursor:pointer; color:var(--text-muted); font-size:.9rem; padding:.5rem 0; list-style:none; }
        .song-files summary::-webkit-details-marker { display:none; }
        .song-files ul { list-style:none; padding:.5rem 0 0 1.25rem; }
        .song-files li { display:flex; align-items:center; gap:.6rem; padding:.3rem 0; font-size:.85rem; flex-wrap:wrap; }
        .file-type { background:rgba(245,158,11,.2); color:var(--prod-accent); padding:.15rem .5rem; border-radius:4px; font-size:.7rem; font-weight:600; text-transform:uppercase; }

        /* Practice view styles */
        .practice-header h2 { color:var(--prac-accent); }
        .practice-card { background:var(--prac-surface); border:1px solid rgba(16,185,129,.2); border-radius:var(--radius); padding:1.5rem; margin-bottom:1.5rem; box-shadow:var(--shadow); transition:box-shadow .2s; }
        .practice-card:hover { box-shadow:var(--shadow-lg); }
        .practice-card-header h3 { font-size:1.25rem; font-weight:600; color:var(--text); }
        .practice-card-meta { display:flex; gap:.6rem; flex-wrap:wrap; }
        .practice-table { margin-top:.75rem; }
        .practice-table th { background:rgba(16,185,129,.15); color:var(--prac-accent); }
        .presets-cell { display:flex; flex-wrap:wrap; gap:.4rem; }
        .path-link { font-size:.85rem; color:var(--text-muted); text-decoration:none; display:flex; align-items:center; gap:.3rem; }
        .path-link:hover { color:var(--prac-accent); }
        .path-link code { font-size:.8rem; background:rgba(0,0,0,.2); padding:.1rem .3rem; border-radius:3px; }
        .practice-files { margin-top:1rem; }
        .practice-files h4 { font-size:.95rem; color:var(--text-muted); margin-bottom:.6rem; font-weight:600; }
        .file-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:.75rem; }
        .file-card { background:rgba(16,185,129,.08); border:1px solid rgba(16,185,129,.15); border-radius:var(--radius); padding:.75rem 1rem; font-size:.85rem; transition:background .2s, border-color .2s; }
        .file-card:hover { background:rgba(16,185,129,.12); border-color:rgba(16,185,129,.3); }
        .file-type-badge { display:inline-block; background:rgba(16,185,129,.2); color:var(--prac-accent); padding:.15rem .5rem; border-radius:4px; font-size:.7rem; font-weight:600; text-transform:uppercase; margin-right:.4rem; }
        .practice-key-section { background:var(--surface); border-radius:8px; padding:1rem 1.25rem; margin:.75rem 0; border:1px solid rgba(16,185,129,.2); }

        /* Responsive design */
        @media (max-width: 768px) {
            .container { padding:0 1rem; }
            nav { padding:1rem 0; position:relative; }
            nav h1 { font-size:1.25rem; }
            nav .nav-links { gap:.3rem; }
            nav .nav-links li a { font-size:.8rem; padding:.35rem .6rem; }
            .page-header { flex-direction:column; align-items:flex-start; gap:.75rem; }
            .page-header h2 { font-size:1.5rem; }
            table { font-size:.85rem; }
            th, td { padding:.75rem .8rem; }
            .form { padding:1.5rem; }
            .btn { padding:.5rem 1rem; }
            .prod-card, .practice-card { padding:1.25rem; }
            .prod-card-header, .practice-card-header { flex-direction:column; }
            .prod-card-actions, .practice-card-meta { flex-direction:column; width:100%; }
            .file-grid { grid-template-columns:1fr; }
            .actions { flex-direction:column; }
        }

        @media (max-width: 480px) {
            nav .nav-links { justify-content:center; width:100%; }
            nav .nav-sep { display:none; }
            th, td { padding:.5rem; font-size:.8rem; }
            .btn-sm { padding:.3rem .6rem; font-size:.75rem; }
            .form-group input, .form-group select, .form-group textarea { font-size:.9rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <nav>
        <h1>Personal Music Browser</h1>
        <ul class="nav-links">
            <li><a href="/">Songs</a></li>
            <li><a href="/albums">Albums</a></li>
            <li><a href="/artists">Artists</a></li>
            <li><a href="/instruments">Instruments</a></li>
            <li><a href="/recordings">Recordings</a></li>
            <li><a href="/bands">Bands</a></li>
            <li class="nav-sep">│</li>
            <li class="nav-prod"><a href="/production">🎛️ Production</a></li>
            <li class="nav-prac"><a href="/practice">🎸 Practice</a></li>
            <li class="nav-prac"><a href="/sets">🎤 Sets</a></li>
            <li class="nav-sep">│</li>
            <li><a href="/workflow">🎯 Workflow</a></li>
            <li><a href="/exercises">🏋️ Exercises</a></li>
            <li><a href="/goals">📋 Goals</a></li>
            <li><a href="/schedule">📅 Schedule</a></li>
            <li><a href="/profile">👤 Profile</a></li>
            <li class="nav-sep">│</li>
            <li class="nav-jobs"><a href="/jobs">🔧 Jobs</a></li>
        </ul>
    </nav>
    {% block content %}{% endblock %}
</div>
</body>
</html>
