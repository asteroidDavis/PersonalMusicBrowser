{% extends "base.html" %}
{% block title %}Add Song File — Personal Music Browser{% endblock %}
{% block content %}
<h2>Add File for "{{ song_title }}"</h2>
<form class="form" method="post">
    <div class="form-group">
        <label for="file_type">File Type</label>
        <select id="file_type" name="file_type" required>
            <option value="daw-project">DAW Project</option>
            <option value="backing-track">Backing Track</option>
            <option value="stem">Stem</option>
            <option value="sheet-music">Sheet Music</option>
            <option value="midi">MIDI</option>
            <option value="audio">Audio</option>
            <option value="video">Video</option>
            <option value="other">Other</option>
        </select>
    </div>
    <div class="form-group">
        <label for="path">File Path</label>
        <input type="text" id="path" name="path" required placeholder="/path/to/project.als">
    </div>
    <div class="form-group">
        <label for="instrument_id">Instrument (optional)</label>
        <select id="instrument_id" name="instrument_id">
            <option value="">— None —</option>
            {% for i in instruments %}
                <option value="{{ i.id }}">{{ i.name }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="form-group">
        <label for="description">Description</label>
        <input type="text" id="description" name="description" placeholder="e.g. Main DAW session, bass stem">
    </div>
    <div class="form-actions">
        <button type="submit" class="btn btn-primary">Save</button>
        <a href="/production" class="btn">Cancel</a>
    </div>
</form>
{% endblock %}
