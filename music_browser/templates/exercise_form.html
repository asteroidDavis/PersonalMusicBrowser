{% extends "base.html" %}
{% block title %}New Exercises{% endblock %}
{% block content %}
<div class="page-header">
    <h2>🏋️ New Practice Exercises</h2>
</div>

<form method="post" action="/exercises/new" class="form-card">
    <div class="form-group">
        <label for="exercise_list">Exercise Names (one per line) *</label>
        <textarea id="exercise_list" name="exercise_list" rows="8" placeholder="Chromatic warmup&#10;Major scales&#10;Minor pentatonic patterns&#10;..." required></textarea>
        <span class="text-muted" style="font-size:0.85em">Enter each exercise name on a separate line</span>
    </div>
    <div class="form-group">
        <label for="category">Category *</label>
        <select id="category" name="category" required>
            <option value="technique">Technique</option>
            <option value="scales">Scales</option>
            <option value="arpeggios">Arpeggios</option>
            <option value="rhythm">Rhythm</option>
            <option value="sight_reading">Sight Reading</option>
            <option value="ear_training">Ear Training</option>
            <option value="song_practice">Song Practice</option>
            <option value="other">Other</option>
        </select>
    </div>
    <div class="form-group">
        <label for="description">Description (applies to all exercises)</label>
        <textarea id="description" name="description" rows="2" placeholder="Common description for all exercises..."></textarea>
    </div>
    <div class="form-group">
        <label for="source">Source (applies to all exercises)</label>
        <input type="text" id="source" name="source" placeholder="e.g. Bass Method Book p.42">
    </div>
    <div class="form-actions">
        <button type="submit" class="btn btn-primary">Create Exercises</button>
        <a href="/exercises" class="btn">Cancel</a>
    </div>
</form>
{% endblock %}
