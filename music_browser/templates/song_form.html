{% extends "base.html" %}
{% block title %}{% if editing %}Edit Song{% else %}Add Song{% endif %} — Personal Music Browser{% endblock %}
{% block content %}
<div class="page-header">
    <h2>{% if editing %}✏️ Edit Song{% else %}🎵 Add Song{% endif %}</h2>
</div>
<form class="form" method="post">
    <input type="hidden" name="return_to" value="{{ return_to }}">
    <div class="form-group">
        <label for="title">Title</label>
        <input type="text" id="title" name="title" required value="{{ title }}">
    </div>
    <div class="form-group">
        <label for="album_id">Album</label>
        <select id="album_id" name="album_id">
            <option value="">-- None --</option>
            {% for a in albums %}
                <option value="{{ a.id }}" {% if a.id == album_id %}selected{% endif %}>{{ a.title }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="form-group">
        <label for="song_type">Song Type</label>
        <select id="song_type" name="song_type">
            <option value="song" {% if song_type == "song" %}selected{% endif %}>Song</option>
            <option value="cover" {% if song_type == "cover" %}selected{% endif %}>Cover</option>
            <option value="composition" {% if song_type == "composition" %}selected{% endif %}>Composition</option>
            <option value="original" {% if song_type == "original" %}selected{% endif %}>Original</option>
            <option value="practice" {% if song_type == "practice" %}selected{% endif %}>Practice</option>
        </select>
    </div>
    <div class="form-group">
        <label for="original_artist">Original Artist</label>
        <input type="text" id="original_artist" name="original_artist" value="{{ original_artist }}">
    </div>
    <div class="form-group">
        <label for="key">Key</label>
        <input type="text" id="key" name="key" value="{{ key }}" placeholder="e.g. C major, Am">
    </div>
    <div class="form-group" style="display:flex;gap:1rem;align-items:end">
        <div style="display:flex;gap:1rem;flex:1">
            <div>
                <label for="bpm_lower">BPM Lower</label>
                <input type="number" id="bpm_lower" name="bpm_lower" value="{% match bpm_lower %}{% when Some with (v) %}{{ v }}{% when None %}{% endmatch %}">
            </div>
            <div>
                <label for="bpm_upper">BPM Upper</label>
                <input type="number" id="bpm_upper" name="bpm_upper" value="{% match bpm_upper %}{% when Some with (v) %}{{ v }}{% when None %}{% endmatch %}">
            </div>
        </div>
        <div>
            <button type="button" id="tap-tempo-btn" class="btn btn-sm">🥁 Tap Tempo</button>
            <div id="tap-display" style="font-size:0.8rem;color:var(--text-muted);margin-top:0.25rem;text-align:center;"></div>
        </div>
    </div>
    <div class="form-group">
        <label for="sheet_music">Sheet Music Path</label>
        <input type="text" id="sheet_music" name="sheet_music" value="{{ sheet_music }}">
    </div>
    <div class="form-group">
        <label for="score_url">Score URL</label>
        <input type="text" id="score_url" name="score_url" value="{{ score_url }}">
    </div>
    <div class="form-group">
        <label for="lyrics">Lyrics Path</label>
        <input type="text" id="lyrics" name="lyrics" value="{{ lyrics }}">
    </div>
    <div class="form-group">
        <label for="description">Description</label>
        <textarea id="description" name="description" rows="3">{{ description }}</textarea>
    </div>
    <div class="form-group">
        <label>Artists</label>
        {% for a in artists %}
            <label class="checkbox-label">
                <input type="checkbox" name="artist_ids[]" value="{{ a.id }}" {% if a.selected %}checked{% endif %}>
                {{ a.name }}
            </label>
        {% endfor %}
    </div>
    <div class="form-actions">
        <button type="submit" class="btn btn-primary">Save</button>
        <a href="/" class="btn">Cancel</a>
    </div>
</form>
<script>
document.addEventListener('DOMContentLoaded', function() {
    const tapBtn = document.getElementById('tap-tempo-btn');
    const tapDisplay = document.getElementById('tap-display');
    const bpmLowerInput = document.getElementById('bpm_lower');
    const bpmUpperInput = document.getElementById('bpm_upper');
    
    let tapTimes = [];
    let tapTimeout;
    
    tapBtn.addEventListener('click', function() {
        const now = Date.now();
        tapTimes.push(now);
        
        // Clear any existing timeout
        if (tapTimeout) {
            clearTimeout(tapTimeout);
        }
        
        // Set timeout to reset after 3 seconds of inactivity
        tapTimeout = setTimeout(function() {
            tapTimes = [];
            tapDisplay.textContent = '';
            tapBtn.textContent = '🥁 Tap Tempo';
        }, 3000);
        
        // Calculate BPM if we have at least 2 taps
        if (tapTimes.length >= 2) {
            // Calculate intervals between consecutive taps
            const intervals = [];
            for (let i = 1; i < tapTimes.length; i++) {
                intervals.push(tapTimes[i] - tapTimes[i - 1]);
            }
            
            // Calculate average interval (ignoring outliers)
            intervals.sort((a, b) => a - b);
            const middleIntervals = intervals.slice(1, -1); // Remove first and last as potential outliers
            const avgInterval = middleIntervals.reduce((sum, interval) => sum + interval, 0) / middleIntervals.length;
            
            // Convert to BPM
            const bpm = Math.round(60000 / avgInterval);
            
            // Update display
            tapDisplay.textContent = `${bpm} BPM`;
            tapBtn.textContent = '🥁 Tap...';
            
            // Update BPM fields
            if (bpmLowerInput.value === '' || parseInt(bpmLowerInput.value) > bpm) {
                bpmLowerInput.value = bpm;
            }
            if (bpmUpperInput.value === '' || parseInt(bpmUpperInput.value) < bpm) {
                bpmUpperInput.value = bpm;
            }
        } else {
            tapDisplay.textContent = 'Keep tapping...';
            tapBtn.textContent = '🥁 Tap...';
        }
    });
});
</script>
{% endblock %}
